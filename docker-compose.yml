services:
  crypto-agent:
    image: alphaply/crypto-agent:v0.2.0-preview.1
    container_name: crypto-agent
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      CONFIG_MASTER_KEY: ${CONFIG_MASTER_KEY:?Set CONFIG_MASTER_KEY in .env}
      PORT: ${PORT:-7860}
      DATA_DIR: /app/data
      RUN_SCHEDULER_IN_WEB: ${RUN_SCHEDULER_IN_WEB:-true}
      TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
    ports:
      - "${PORT:-7860}:7860"
    volumes:
      - crypto_agent_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  crypto_agent_data:
