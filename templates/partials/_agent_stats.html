<!-- 📊 Agent 做单统计卡片 (partial) -->
<!-- 使用方式: {% include 'partials/_agent_stats.html' %} (上下文需要 summary 变量) -->

<div id="stats-panel-{{ summary.config_id }}" class="agent-stats-panel">
    <!-- 通用统计卡片 (所有模式) -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3">
        <div class="bg-white border border-gray-200 rounded-xl p-2.5 sm:p-3 shadow-sm">
            <div class="text-[8px] sm:text-[9px] font-bold text-gray-400 uppercase tracking-wider mb-1">开单总数</div>
            <div class="text-base sm:text-lg font-black text-gray-900" id="stat-total-{{ summary.config_id }}">--</div>
            <div class="text-[8px] sm:text-[9px] text-gray-400 mt-0.5" id="stat-period-{{ summary.config_id }}"></div>
        </div>
        <div class="bg-white border border-gray-200 rounded-xl p-2.5 sm:p-3 shadow-sm">
            <div class="text-[8px] sm:text-[9px] font-bold text-gray-400 uppercase tracking-wider mb-1">多空比 (L/S)</div>
            <div class="flex items-baseline gap-2">
                <span class="text-base sm:text-lg font-black text-gray-900" id="stat-ls-{{ summary.config_id }}">--</span>
            </div>
            <div class="flex gap-2 mt-1 text-[8px] sm:text-[9px] font-bold">
                <span class="text-emerald-600" id="stat-buy-{{ summary.config_id }}">多:0</span>
                <span class="text-red-500" id="stat-sell-{{ summary.config_id }}">空:0</span>
            </div>
        </div>
        <div class="bg-white border border-gray-200 rounded-xl p-2.5 sm:p-3 shadow-sm">
            <div class="text-[8px] sm:text-[9px] font-bold text-gray-400 uppercase tracking-wider mb-1">取消率</div>
            <div class="text-base sm:text-lg font-black" id="stat-cancel-{{ summary.config_id }}">--</div>
            <div class="text-[8px] sm:text-[9px] text-gray-400 mt-0.5" id="stat-cancel-count-{{ summary.config_id }}"></div>
        </div>
        <div class="bg-white border border-gray-200 rounded-xl p-2.5 sm:p-3 shadow-sm">
            <div class="text-[8px] sm:text-[9px] font-bold text-gray-400 uppercase tracking-wider mb-1">平仓次数</div>
            <div class="text-base sm:text-lg font-black text-gray-900" id="stat-close-{{ summary.config_id }}">--</div>
        </div>
    </div>

    <!-- 实盘仓位面板 (仅 REAL 模式，JS 动态渲染) -->
    {% if summary.mode == 'REAL' %}
    <div id="position-panel-{{ summary.config_id }}" class="mt-3 hidden">
        <div class="bg-gradient-to-r from-gray-900 to-gray-800 rounded-2xl p-3 sm:p-4 text-white shadow-lg">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-3 gap-1">
                <h4 class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-gray-300 flex items-center gap-2">
                    🔴 实时仓位 & 盈亏
                    <button onclick="loadPositionStats('{{ summary.config_id }}')" class="text-[9px] bg-white/10 hover:bg-white/20 px-2 py-0.5 rounded-md transition-colors">🔄 刷新</button>
                </h4>
                <span class="text-[9px] sm:text-[10px] font-mono text-gray-400" id="pos-balance-{{ summary.config_id }}"></span>
            </div>
            <div id="pos-container-{{ summary.config_id }}" class="space-y-2">
                <div class="text-center text-gray-500 text-xs py-3 italic">点击刷新获取实时仓位...</div>
            </div>
            <!-- 盈亏摘要 -->
            <div id="pos-summary-{{ summary.config_id }}" class="mt-3 pt-3 border-t border-white/10 hidden">
                <div class="grid grid-cols-3 gap-2 sm:gap-3 text-center">
                    <div>
                        <div class="text-[8px] text-gray-400 uppercase">已实现盈亏</div>
                        <div class="text-sm font-black" id="pos-pnl-{{ summary.config_id }}">--</div>
                    </div>
                    <div>
                        <div class="text-[8px] text-gray-400 uppercase">胜率</div>
                        <div class="text-sm font-black" id="pos-winrate-{{ summary.config_id }}">--</div>
                    </div>
                    <div>
                        <div class="text-[8px] text-gray-400 uppercase">总成交</div>
                        <div class="text-sm font-black text-white" id="pos-trades-{{ summary.config_id }}">--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endif %}
</div>
