<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>{% block title %}Crypto Agent{% endblock %}</title>
    <script>
      (function preloadThemeState() {
        try {
          const mode = localStorage.getItem('crypto-agent-theme-mode') || 'auto';
          const resolved = mode === 'auto'
            ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : mode;
          const root = document.documentElement;
          root.setAttribute('data-theme-mode', mode);
          root.setAttribute('data-theme', resolved);
        } catch (error) {
          document.documentElement.setAttribute('data-theme', 'light');
          document.documentElement.setAttribute('data-theme-mode', 'auto');
        }
      })();
    </script>
    
    <!-- 网站图标 -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    
    <!-- 基础样式和字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    </noscript>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'buy': '#059669',
              'sell': '#dc2626',
              'cancel': '#94a3b8',
            }
          }
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <style>
      .nav-icon-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 0.75rem;
        border: 1px solid var(--border-soft);
        background: color-mix(in srgb, var(--surface-1) 86%, transparent);
        color: var(--text-muted);
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
        transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
        flex-shrink: 0;
      }

      .nav-icon-link:hover {
        color: var(--text-primary);
        background: var(--surface-1);
      }

      .nav-icon-svg {
        width: 1.1rem;
        height: 1.1rem;
        flex-shrink: 0;
      }

      .nav-quick-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        line-height: 1;
      }

      .nav-quick-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1rem;
        height: 1rem;
        line-height: 1;
        flex-shrink: 0;
      }

      .nav-quick-text {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .theme-control {
        border: 1px solid var(--border-soft);
        background: color-mix(in srgb, var(--surface-1) 92%, transparent);
        color: var(--text-secondary);
        border-radius: 0.75rem;
        height: 2.45rem;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 0 0.7rem;
      }

      .theme-control:hover {
        border-color: var(--accent-500);
        color: var(--text-primary);
      }

      .theme-control-select {
        min-width: 6.5rem;
      }

      @media (min-width: 768px) {
        .nav-icon-link {
          width: 2.5rem;
          height: 2.5rem;
        }

        .nav-icon-svg {
          width: 1rem;
          height: 1rem;
        }

        .nav-quick-icon {
          width: 0.95rem;
          height: 0.95rem;
        }

        .nav-quick-text {
          font-size: 0.75rem;
        }

        .theme-control {
          font-size: 0.75rem;
        }
      }
    </style>
    
    {% block head %}{% endblock %}
  </head>
  <body class="{% block body_class %}font-sans antialiased overflow-x-hidden min-h-screen flex flex-col{% endblock %}">

    {% block navbar %}
    <nav class="sticky top-0 z-50 backdrop-blur-xl shadow-sm border-b" style="background: color-mix(in srgb, var(--surface-1) 84%, transparent); border-color: var(--border-soft);">
      <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8"> 
        <div class="flex flex-col md:flex-row justify-between items-center py-2 md:py-3 gap-2 md:gap-3">
          <div class="font-bold text-base md:text-lg tracking-tight flex items-center justify-between w-full md:w-auto gap-2" style="color: var(--text-primary);">
            <span class="flex items-center gap-1.5">
                <a href="/" class="flex items-center gap-1.5 hover:opacity-80 transition-opacity">
                    💸 <span class="bg-clip-text text-transparent" style="background-image: linear-gradient(90deg, var(--accent-500), var(--accent-600));">Crypto Agent</span>
                </a>
            </span>
            <div class="flex items-center gap-2">
                <a href="https://my.feishu.cn/wiki/FfYkwTigTiFzIZkvgE4cW2oLnvd" target="_blank" class="nav-icon-link" title="使用文档" aria-label="使用文档">
                  <svg viewBox="0 0 24 24" class="nav-icon-svg fill-current"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                </a>
                <a href="https://github.com/alphaply/crypto-agent" target="_blank" class="nav-icon-link" title="GitHub Repository" aria-label="GitHub Repository">
                  <svg viewBox="0 0 24 24" class="nav-icon-svg fill-current"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                </a>
                <button onclick="location.reload()" title="刷新" class="nav-icon-link md:hidden" aria-label="刷新">
                  <svg viewBox="0 0 24 24" class="nav-icon-svg" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 10-2.34 5.66"/><path d="M20 4v7h-7"/></svg>
                </button>
                <button data-theme-toggle class="theme-control hidden md:inline-flex items-center justify-center" style="width: 2.5rem; padding: 0;"></button>
            </div>
          </div>
          {% if symbols %}
          <div class="flex w-full md:w-auto items-center gap-2 flex-wrap md:flex-nowrap">
             <select id="globalSymbolSelect" onchange="window.location.href = this.value ? ('?symbol=' + encodeURIComponent(this.value)) : window.location.pathname" class="form-select text-xs md:text-sm rounded-xl block p-2 md:p-2.5 outline-none flex-grow md:w-44 shadow-sm min-h-11" style="background: color-mix(in srgb, var(--surface-1) 90%, transparent); border: 1px solid var(--border-soft); color: var(--text-primary);">
              {% for sym in symbols %} 
                <option value="{{ sym }}" {% if sym == current_symbol %}selected{% endif %}>{{ sym }}</option>
              {% endfor %}
            </select>
            <button data-theme-toggle class="theme-control inline-flex items-center justify-center md:hidden" style="width: 2.75rem; padding: 0;"></button>
            <div class="flex gap-1 w-full md:w-auto overflow-x-auto no-scrollbar pb-1 md:pb-0">
                <div class="inline-flex rounded-xl shadow-sm min-w-max" role="group">
                    <a href="/chat" title="Chat" class="nav-quick-action min-h-11 px-3 md:px-3.5 py-2 font-medium rounded-l-xl" style="color: var(--text-secondary); background: color-mix(in srgb, var(--surface-1) 90%, transparent); border: 1px solid var(--border-soft);" aria-label="Chat">
                      <svg viewBox="0 0 24 24" class="nav-quick-icon" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h8M8 14h5m-8 6l3.5-3.5H19a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h.5L5 20z"/></svg>
                      <span class="nav-quick-text">聊天</span>
                    </a>
                    <a href="/admin" title="后台管理" class="nav-quick-action min-h-11 px-3 md:px-3.5 py-2 font-medium" style="color: var(--text-secondary); background: color-mix(in srgb, var(--surface-1) 90%, transparent); border: 1px solid var(--border-soft); border-left: 0;" aria-label="后台管理">
                      <svg viewBox="0 0 24 24" class="nav-quick-icon" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0-1.066 2.573c-.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>
                      <span class="nav-quick-text">后台</span>
                    </a>
                    <a href="/stats/public?symbol={{ current_symbol }}" title="公开统计" class="nav-quick-action min-h-11 px-3 md:px-3.5 py-2 font-medium" style="color: var(--text-secondary); background: color-mix(in srgb, var(--surface-1) 90%, transparent); border: 1px solid var(--border-soft); border-left: 0;" aria-label="公开统计">
                      <svg viewBox="0 0 24 24" class="nav-quick-icon" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3v18h18"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 14l4-4 3 3 5-6"/></svg>
                      <span class="nav-quick-text">统计</span>
                    </a>
                    <a href="/history?symbol={{ current_symbol }}" title="历史回溯" class="nav-quick-action min-h-11 px-3 md:px-3.5 py-2 font-medium" style="color: var(--text-secondary); background: color-mix(in srgb, var(--surface-1) 90%, transparent); border: 1px solid var(--border-soft); border-left: 0;" aria-label="历史回溯">
                      <svg viewBox="0 0 24 24" class="nav-quick-icon" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
                      <span class="nav-quick-text">历史</span>
                    </a>
                    
                </div>
                <button onclick="location.reload()" title="刷新" class="nav-icon-link hidden md:inline-flex" aria-label="刷新">
                  <svg viewBox="0 0 24 24" class="nav-icon-svg" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 10-2.34 5.66"/><path d="M20 4v7h-7"/></svg>
                </button>
            </div>
          </div>
          {% endif %}
        </div>
      </div>
    </nav>
    {% endblock %}

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/theme.js') }}" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
